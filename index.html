<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Manager Mobile - CoasinLogicalis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --logicalis-blue: #004a99;
            --accent-blue: #00aef0;
            --corp-gray: #58595b;
            --corp-red: #e41613;
        }
        body {
            background-color: #f1f5f9;
            color: var(--corp-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation;
        }
        .kanban-column {
            min-height: 200px;
            transition: all 0.3s ease;
        }
        .task-card {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            z-index: 10;
        }
        .dragging-active {
            position: fixed !important;
            pointer-events: none;
            z-index: 9999 !important;
            transform: scale(1.05) rotate(3deg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            opacity: 0.9;
        }
        .column-highlight {
            background-color: rgba(0, 174, 240, 0.15) !important;
            border: 2px solid var(--accent-blue) !important;
        }
        /* Fix para responsividad en moviles pequeños */
        @media (max-width: 640px) {
            .container { padding-left: 1rem; padding-right: 1rem; }
            h1 { font-size: 1.25rem; }
        }
        .loading-overlay {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
    </style>
</head>
<body class="pb-10">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-800"></div>
    </div>

    <!-- Nav -->
    <nav class="bg-white shadow-sm sticky top-0 z-[100] px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-20 h-8 flex items-center justify-center bg-gray-50 border rounded text-[10px] font-bold text-gray-400 uppercase tracking-tighter overflow-hidden">
                <img id="display-logo" class="hidden max-h-full" src="" alt="Logo">
                <span id="logo-text">Logicalis</span>
            </div>
            <div class="flex space-x-2 border-l pl-3">
                <button onclick="showView('tasks')" class="text-xs font-bold text-blue-900 uppercase">Tareas</button>
                <button onclick="showView('dashboard')" class="text-xs font-bold text-gray-400 uppercase">Stats</button>
            </div>
        </div>
        <button onclick="openTaskModal()" class="bg-[#004a99] text-white text-[11px] font-bold px-3 py-2 rounded-lg">+ Tarea</button>
    </nav>

    <main class="mt-4 container mx-auto">
        
        <!-- Seleccion Area -->
        <div id="area-selection" class="hidden px-4 py-10">
            <h2 class="text-center font-black text-gray-400 uppercase tracking-widest text-xs mb-8">Selecciona Workspace</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="selectArea('Alianzas')" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-transparent active:border-blue-500 flex items-center space-x-4">
                    <span class="text-3xl">🤝</span>
                    <div class="text-left">
                        <h3 class="font-bold text-lg text-blue-900">Alianzas</h3>
                        <p class="text-xs text-gray-400">Gestión estratégica</p>
                    </div>
                </button>
                <button onclick="selectArea('CCTN')" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-transparent active:border-blue-500 flex items-center space-x-4">
                    <span class="text-3xl">⚙️</span>
                    <div class="text-left">
                        <h3 class="font-bold text-lg text-blue-900">CCTN</h3>
                        <p class="text-xs text-gray-400">Centro de Competencias</p>
                    </div>
                </button>
            </div>
        </div>

        <!-- Vista Tareas -->
        <div id="tasks-view" class="hidden px-2">
            <div class="flex justify-between items-center mb-6 px-2">
                <button onclick="backToAreas()" class="text-gray-400 flex items-center text-xs">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg> ATRÁS
                </button>
                <span id="current-area-tag" class="bg-blue-100 text-blue-800 text-[10px] font-black px-3 py-1 rounded-full uppercase">AREA</span>
            </div>

            <!-- Tablero Kanban Adaptado -->
            <div class="space-y-8">
                <!-- Columna: Pendiente -->
                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2 flex justify-between">
                        Pendientes <span id="count-todo" class="text-gray-300">0</span>
                    </h4>
                    <div id="col-todo" data-status="todo" class="kanban-column bg-gray-200/50 p-3 rounded-2xl space-y-3 border-2 border-transparent"></div>
                </div>

                <!-- Columna: En Proceso -->
                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-blue-400 uppercase tracking-widest px-2 flex justify-between">
                        En Proceso <span id="count-doing" class="text-blue-200">0</span>
                    </h4>
                    <div id="col-doing" data-status="doing" class="kanban-column bg-blue-50/50 p-3 rounded-2xl space-y-3 border-2 border-transparent"></div>
                </div>

                <!-- Columna: Finalizado -->
                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-green-500 uppercase tracking-widest px-2 flex justify-between">
                        Completado <span id="count-done" class="text-green-200">0</span>
                    </h4>
                    <div id="col-done" data-status="done" class="kanban-column bg-green-50/50 p-3 rounded-2xl space-y-3 border-2 border-transparent"></div>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-view" class="hidden px-4">
            <h2 class="font-bold text-blue-900 mb-6 uppercase text-sm tracking-tighter">Estadísticas Globales</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white p-4 rounded-xl shadow-sm"><p class="text-[9px] font-bold text-gray-400 uppercase">Total</p><h3 id="kpi-total" class="text-2xl font-black">0</h3></div>
                <div class="bg-white p-4 rounded-xl shadow-sm"><p class="text-[9px] font-bold text-gray-400 uppercase">Completadas</p><h3 id="kpi-done" class="text-2xl font-black text-green-500">0</h3></div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 h-64">
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </main>

    <!-- Modal Tarea -->
    <div id="task-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[1000] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-6">
                <h3 class="text-lg font-bold mb-4 text-blue-900">Nueva Tarea</h3>
                <form id="task-form" onsubmit="saveTask(event)" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="task-title" placeholder="¿Qué hay que hacer?" required class="w-full bg-gray-100 p-3 rounded-xl outline-none text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="task-area" class="bg-gray-100 p-3 rounded-xl text-sm outline-none">
                            <option value="Alianzas">Alianzas</option>
                            <option value="CCTN">CCTN</option>
                        </select>
                        <input type="date" id="task-date" required class="bg-gray-100 p-3 rounded-xl text-sm outline-none">
                    </div>
                    <textarea id="task-desc" placeholder="Detalles (opcional)" class="w-full bg-gray-100 p-3 rounded-xl text-sm outline-none h-20"></textarea>
                    <div class="flex space-x-2">
                        <button type="button" onclick="closeTaskModal()" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold text-xs">Cancelar</button>
                        <button type="submit" class="flex-1 bg-[#004a99] text-white py-3 rounded-xl font-bold text-xs">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHV61Lh6QefR1AgHMwte6051Xaydij3Iw",
            authDomain: "gestor-de-tareas-249cd.firebaseapp.com",
            projectId: "gestor-de-tareas-249cd",
            storageBucket: "gestor-de-tareas-249cd.firebasestorage.app",
            messagingSenderId: "560578282378",
            appId: "1:560578282378:web:761eb05a90c4d663a9fe73"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let tasks = [];
        let currentArea = null;

        // --- AUTH & DATA ---
        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            
            onSnapshot(collection(db, 'gestor_tareas'), (snapshot) => {
                tasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('loading').classList.add('hidden');
                if (!currentArea && document.getElementById('dashboard-view').classList.contains('hidden')) {
                    document.getElementById('area-selection').classList.remove('hidden');
                }
                renderTasks();
                updateStats();
            });
        });

        // --- NAVIGATION ---
        window.showView = (v) => {
            document.getElementById('area-selection').classList.add('hidden');
            document.getElementById('tasks-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
            if (v === 'tasks') {
                if (!currentArea) document.getElementById('area-selection').classList.remove('hidden');
                else document.getElementById('tasks-view').classList.remove('hidden');
            } else if (v === 'dashboard') {
                document.getElementById('dashboard-view').classList.remove('hidden');
                initCharts();
            }
        };

        window.selectArea = (a) => {
            currentArea = a;
            document.getElementById('current-area-tag').innerText = a;
            showView('tasks');
            renderTasks();
        };

        window.backToAreas = () => {
            currentArea = null;
            showView('tasks');
        };

        // --- KANBAN MOBILE DRAG LOGIC (ROBUST) ---
        let dragItem = null;
        let dragId = null;
        let startX, startY;

        function setupDrag(element, id) {
            // Mouse
            element.ondragstart = (e) => e.dataTransfer.setData("taskId", id);

            // Touch
            element.addEventListener('touchstart', (e) => {
                if (e.target.closest('button')) return;
                const touch = e.touches[0];
                dragId = id;
                dragItem = element;
                startX = touch.clientX - element.offsetLeft;
                startY = touch.clientY - element.offsetTop;
                
                // Feedback
                if (navigator.vibrate) navigator.vibrate(10);
            }, { passive: true });

            element.addEventListener('touchmove', (e) => {
                if (!dragItem) return;
                e.preventDefault(); // Bloquear scroll durante drag
                const touch = e.touches[0];
                
                // Aplicar estilos de arrastre
                dragItem.classList.add('dragging-active');
                dragItem.style.width = (window.innerWidth - 40) + 'px';
                dragItem.style.left = touch.clientX - (dragItem.offsetWidth / 2) + 'px';
                dragItem.style.top = touch.clientY - (dragItem.offsetHeight / 2) + 'px';

                // Check collision
                const col = getColumnUnderPoint(touch.clientX, touch.clientY);
                document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('column-highlight'));
                if (col) col.classList.add('column-highlight');
            }, { passive: false });

            element.addEventListener('touchend', (e) => {
                if (!dragItem) return;
                const touch = e.changedTouches[0];
                const col = getColumnUnderPoint(touch.clientX, touch.clientY);
                
                document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('column-highlight'));
                
                if (col) {
                    const newStatus = col.getAttribute('data-status');
                    updateTaskStatus(dragId, newStatus);
                }

                dragItem.classList.remove('dragging-active');
                dragItem.style.position = '';
                dragItem.style.left = '';
                dragItem.style.top = '';
                dragItem.style.width = '';
                dragItem = null;
                dragId = null;
                
                renderTasks(); // Refresh para limpiar basura visual
            });
        }

        function getColumnUnderPoint(x, y) {
            const cols = document.querySelectorAll('.kanban-column');
            for (let col of cols) {
                const rect = col.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    return col;
                }
            }
            return null;
        }

        async function updateTaskStatus(id, status) {
            await updateDoc(doc(db, 'gestor_tareas', id), { status, updatedAt: serverTimestamp() });
        }

        // --- RENDER ---
        function renderTasks() {
            const cols = { todo: 'col-todo', doing: 'col-doing', done: 'col-done' };
            const countLabels = { todo: 'count-todo', doing: 'count-doing', done: 'count-done' };
            
            Object.values(cols).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '';
            });

            const filtered = tasks.filter(t => t.area === currentArea);
            const stats = { todo: 0, doing: 0, done: 0 };

            filtered.forEach(t => {
                const card = document.createElement('div');
                card.className = "task-card bg-white p-4 rounded-xl shadow-sm border border-gray-100 active:scale-95 transition-transform";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h5 class="font-bold text-gray-800 text-sm leading-tight">${t.title}</h5>
                        <button onclick="deleteTask('${t.id}')" class="text-gray-300 p-1">
                             <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"></path></svg>
                        </button>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-1 mb-3 line-clamp-1">${t.desc || '...'}</p>
                    <div class="flex items-center text-[9px] font-black text-gray-400 uppercase tracking-tighter">
                        <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        ${t.date}
                    </div>
                `;
                setupDrag(card, t.id);
                document.getElementById(cols[t.status]).appendChild(card);
                stats[t.status]++;
            });

            Object.keys(countLabels).forEach(k => {
                const el = document.getElementById(countLabels[k]);
                if (el) el.innerText = stats[k];
            });
        }

        // --- CRUD ---
        window.openTaskModal = () => document.getElementById('task-modal').classList.remove('hidden');
        window.closeTaskModal = () => document.getElementById('task-modal').classList.add('hidden');

        window.saveTask = async (e) => {
            e.preventDefault();
            const id = Date.now().toString();
            const data = {
                title: document.getElementById('task-title').value,
                area: document.getElementById('task-area').value,
                desc: document.getElementById('task-desc').value,
                date: document.getElementById('task-date').value,
                status: 'todo',
                updatedAt: serverTimestamp()
            };
            closeTaskModal();
            await setDoc(doc(db, 'gestor_tareas', id), data);
            document.getElementById('task-form').reset();
        };

        window.deleteTask = async (id) => {
            if(confirm('¿Eliminar?')) await deleteDoc(doc(db, 'gestor_tareas', id));
        };

        // --- DASHBOARD ---
        function updateStats() {
            document.getElementById('kpi-total').innerText = tasks.length;
            document.getElementById('kpi-done').innerText = tasks.filter(t => t.status === 'done').length;
        }

        let chart;
        function initCharts() {
            const ctx = document.getElementById('barChart');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Pend', 'Proc', 'OK'],
                    datasets: [{
                        label: 'Tareas',
                        data: ['todo', 'doing', 'done'].map(s => tasks.filter(t => t.status === s).length),
                        backgroundColor: ['#94a3b8', '#00aef0', '#10b981'],
                        borderRadius: 6
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // Drag handlers for desktop
        window.addEventListener('dragover', e => e.preventDefault());
        window.addEventListener('drop', async e => {
            e.preventDefault();
            const id = e.dataTransfer.getData("taskId");
            const col = e.target.closest('.kanban-column');
            if (id && col) {
                const status = col.getAttribute('data-status');
                await updateTaskStatus(id, status);
            }
        });

    </script>
</body>
</html>

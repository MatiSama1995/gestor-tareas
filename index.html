<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - CoasinLogicalis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --logicalis-blue: #004a99;
            --accent-blue: #00aef0;
            --corp-gray: #58595b;
            --refined-bg: #f8fafc;
        }
        body { background-color: var(--refined-bg); color: var(--corp-gray); font-family: sans-serif; }
        .bg-logicalis { background-color: var(--logicalis-blue); }
        .nav-link.active { border-bottom: 3px solid var(--accent-blue); color: var(--logicalis-blue); font-weight: bold; }
        .kanban-column { min-height: 70vh; }
        .task-card { cursor: grab; transition: all 0.2s; border-radius: 0.75rem; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[1000]">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-blue-600 font-bold">Conectando a Firebase...</p>
    </div>

    <nav class="bg-white shadow-md px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-6">
            <span class="font-bold text-logicalis">GESTOR CLOUD</span>
            <button onclick="showView('tasks')" id="nav-tasks" class="nav-link active py-2">Tareas</button>
            <button onclick="showView('dashboard')" id="nav-dashboard" class="nav-link py-2">Dashboard</button>
        </div>
        <button onclick="openTaskModal()" class="bg-blue-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-600">+ Nueva</button>
    </nav>

    <main class="container mx-auto p-6">
        <div id="area-selection" class="flex flex-col items-center justify-center min-h-[60vh]">
            <h1 class="text-2xl font-bold mb-8 text-center text-logicalis">Bienvenido al Gestor de Tareas</h1>
            <p class="mb-8 text-gray-500">Selecciona tu área de trabajo para comenzar</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                <button onclick="selectArea('Alianzas')" class="bg-white p-10 rounded-2xl shadow-lg border-2 border-transparent hover:border-blue-400 transition transform hover:scale-105">
                    <span class="text-5xl block mb-2">🤝</span> <span class="font-bold">Alianzas</span>
                </button>
                <button onclick="selectArea('CCTN')" class="bg-white p-10 rounded-2xl shadow-lg border-2 border-transparent hover:border-blue-400 transition transform hover:scale-105">
                    <span class="text-5xl block mb-2">⚙️</span> <span class="font-bold">CCTN</span>
                </button>
            </div>
        </div>

        <div id="tasks-view" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <button onclick="backToAreas()" class="mr-4 text-gray-500 hover:text-blue-600">← Volver</button>
                    <h1 id="current-area-title" class="text-xl font-bold text-logicalis">Area</h1>
                </div>
                <div id="sync-status" class="text-[10px] text-green-500 font-bold flex items-center">
                    <div class="w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse"></div> EN LÍNEA
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="flex flex-col">
                    <h3 class="text-xs font-bold uppercase mb-4 text-gray-400 px-2 text-center">Por Hacer</h3>
                    <div id="col-todo" ondrop="drop(event, 'todo')" ondragover="allowDrop(event)" class="kanban-column bg-gray-100 p-4 rounded-2xl space-y-3"></div>
                </div>
                <div class="flex flex-col">
                    <h3 class="text-xs font-bold uppercase mb-4 text-blue-500 px-2 text-center">Haciendo</h3>
                    <div id="col-doing" ondrop="drop(event, 'doing')" ondragover="allowDrop(event)" class="kanban-column bg-blue-50 p-4 rounded-2xl space-y-3"></div>
                </div>
                <div class="flex flex-col">
                    <h3 class="text-xs font-bold uppercase mb-4 text-green-600 px-2 text-center">Hecho</h3>
                    <div id="col-done" ondrop="drop(event, 'done')" ondragover="allowDrop(event)" class="kanban-column bg-green-50 p-4 rounded-2xl space-y-3"></div>
                </div>
            </div>
        </div>

        <div id="dashboard-view" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-2xl shadow h-80">
                    <h3 class="text-sm font-bold mb-4 text-center">Estado de Tareas</h3>
                    <canvas id="barChart"></canvas>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow h-80">
                    <h3 class="text-sm font-bold mb-4 text-center">Distribución por Área</h3>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="task-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
            <div class="bg-logicalis p-4 text-white font-bold">Nueva Tarea</div>
            <form onsubmit="handleTaskSubmit(event)" class="p-6 space-y-4">
                <input type="text" id="task-title" placeholder="¿Qué hay que hacer?" required class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                <select id="task-area" class="w-full border p-3 rounded-xl outline-none">
                    <option value="Alianzas">Alianzas</option>
                    <option value="CCTN">CCTN</option>
                </select>
                <input type="date" id="task-date" required class="w-full border p-3 rounded-xl outline-none">
                <div class="flex space-x-2 pt-2">
                    <button type="button" onclick="closeTaskModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold hover:bg-gray-200">Cancelar</button>
                    <button type="submit" class="flex-1 bg-logicalis text-white py-3 rounded-xl font-bold shadow-lg hover:opacity-90">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN REAL DE FIREBASE (Verificada por el usuario)
        const firebaseConfig = {
            apiKey: "AIzaSyBHV61Lh6QefR1AgHMwte6051Xaydij3Iw",
            authDomain: "gestor-de-tareas-249cd.firebaseapp.com",
            projectId: "gestor-de-tareas-249cd",
            storageBucket: "gestor-de-tareas-249cd.firebasestorage.app",
            messagingSenderId: "560578282378",
            appId: "1:560578282378:web:761eb05a90c4d663a9fe73"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let tasks = [];
        let currentArea = null;
        let charts = { bar: null, pie: null };

        // Función para manejar el estado de autenticación y carga de datos
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                try {
                    await signInAnonymously(auth);
                } catch (e) {
                    console.error("Error de autenticación:", e);
                    if (e.code === 'auth/configuration-not-found') {
                        alert("⚠️ ERROR CRÍTICO: Debes activar 'Anónimo' en la consola de Firebase.\n\nPasos:\n1. Ve a console.firebase.google.com\n2. Sección 'Authentication' > 'Sign-in method'\n3. Botón 'Agregar nuevo proveedor'\n4. Selecciona 'Anónimo' y dale a Habilitar.");
                    }
                }
            } else {
                // Escuchar datos en tiempo real de Firestore
                onSnapshot(collection(db, 'gestor_tareas'), (snapshot) => {
                    tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    document.getElementById('loading').classList.add('hidden');
                    if (currentArea) renderTasks();
                    if (!document.getElementById('dashboard-view').classList.contains('hidden')) updateCharts();
                }, (error) => {
                    console.error("Error de Firestore:", error);
                    alert("Error de permisos: Ve a Firestore > Reglas y cambia a 'allow read, write: if true;'");
                });
            }
        });

        window.selectArea = (area) => { 
            currentArea = area; 
            document.getElementById('current-area-title').innerText = area; 
            showView('tasks'); 
        };

        window.showView = (viewId) => {
            document.getElementById('area-selection').classList.add('hidden');
            document.getElementById('tasks-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

            if (viewId === 'tasks' && currentArea) {
                document.getElementById('tasks-view').classList.remove('hidden');
                document.getElementById('nav-tasks').classList.add('active');
                renderTasks();
            } else if (viewId === 'dashboard') {
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('nav-dashboard').classList.add('active');
                updateCharts();
            } else {
                document.getElementById('area-selection').classList.remove('hidden');
            }
        };

        window.backToAreas = () => { currentArea = null; showView('selection'); };
        window.openTaskModal = () => document.getElementById('task-modal').classList.replace('hidden', 'flex');
        window.closeTaskModal = () => document.getElementById('task-modal').classList.replace('flex', 'hidden');

        window.handleTaskSubmit = async (e) => {
            e.preventDefault();
            const id = Date.now().toString();
            const data = {
                title: document.getElementById('task-title').value,
                area: document.getElementById('task-area').value,
                date: document.getElementById('task-date').value,
                status: 'todo',
                createdAt: new Date().toISOString()
            };
            try {
                await setDoc(doc(db, 'gestor_tareas', id), data);
                closeTaskModal();
                e.target.reset();
            } catch (e) {
                console.error("Error al guardar:", e);
                alert("No se pudo guardar la tarea. Revisa la consola.");
            }
        };

        window.deleteTask = async (id) => {
            if(confirm("¿Deseas eliminar esta tarea permanentemente?")) {
                try {
                    await deleteDoc(doc(db, 'gestor_tareas', id));
                } catch (e) {
                    console.error("Error al eliminar:", e);
                }
            }
        };

        window.allowDrop = (ev) => ev.preventDefault();
        window.drag = (ev, id) => ev.dataTransfer.setData("text", id);
        window.drop = async (ev, status) => {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("text");
            try {
                await setDoc(doc(db, 'gestor_tareas', id), { status }, { merge: true });
            } catch (e) {
                console.error("Error al actualizar estado:", e);
            }
        };

        function renderTasks() {
            const cols = { todo: 'col-todo', doing: 'col-doing', done: 'col-done' };
            Object.values(cols).forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = "";
            });
            
            tasks.filter(t => t.area === currentArea).forEach(t => {
                const card = document.createElement('div');
                card.className = "task-card bg-white p-4 shadow-sm text-sm border border-gray-100 relative group";
                card.draggable = true;
                card.ondragstart = (e) => drag(e, t.id);
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-gray-700">${t.title}</span>
                        <button onclick="deleteTask('${t.id}')" class="text-gray-300 hover:text-red-500 transition ml-2">✕</button>
                    </div>
                    <div class="text-[10px] text-gray-400 mt-2 flex items-center justify-between">
                        <span>📅 ${t.date}</span>
                        <span class="bg-gray-100 px-2 py-0.5 rounded text-gray-500">${t.area}</span>
                    </div>
                `;
                document.getElementById(cols[t.status]).appendChild(card);
            });
        }

        function updateCharts() {
            const statusData = ['todo', 'doing', 'done'].map(s => tasks.filter(t => t.status === s).length);
            const areaData = ['Alianzas', 'CCTN'].map(a => tasks.filter(t => t.area === a).length);

            if (charts.bar) charts.bar.destroy();
            const ctxBar = document.getElementById('barChart');
            if (ctxBar) {
                charts.bar = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels: ['Pendiente', 'En Progreso', 'Hecho'],
                        datasets: [{ 
                            label: 'Cantidad de Tareas', 
                            data: statusData, 
                            backgroundColor: ['#94a3b8', '#3b82f6', '#22c55e'],
                            borderRadius: 8
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                    }
                });
            }

            if (charts.pie) charts.pie.destroy();
            const ctxPie = document.getElementById('pieChart');
            if (ctxPie) {
                charts.pie = new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: ['Alianzas', 'CCTN'],
                        datasets: [{ 
                            data: areaData, 
                            backgroundColor: ['#004a99', '#00aef0'],
                            borderWidth: 0
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        cutout: '70%',
                        plugins: { legend: { position: 'bottom' } }
                    }
                });
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Manager - CoasinLogicalis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --logicalis-blue: #004a99;
            --accent-blue: #00aef0;
            --corp-gray: #58595b;
            --corp-red: #e41613;
        }
        body {
            background-color: #f1f5f9;
            color: var(--corp-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation;
        }
        .kanban-column {
            min-height: 200px;
            transition: all 0.3s ease;
        }
        .task-card {
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            transition: transform 0.1s ease;
        }
        .task-card:active { cursor: grabbing; }
        
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .column-highlight {
            background-color: rgba(0, 174, 240, 0.1) !important;
            border: 2px dashed var(--accent-blue) !important;
        }

        .stat-card {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-bottom: 4px solid transparent;
        }

        .loading-overlay {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }

        .delete-hitbox {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 200;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: transparent;
            cursor: pointer !important;
            transition: all 0.2s;
        }
        .delete-hitbox:hover {
            background: #fee2e2;
            color: #ef4444;
        }
        .delete-hitbox svg {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }
    </style>
</head>
<body class="pb-24">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-800"></div>
    </div>

    <!-- Navegación -->
    <nav class="bg-white shadow-sm sticky top-0 z-[100] px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="w-20 h-8 flex items-center justify-center bg-gray-50 border rounded text-[10px] font-bold text-gray-400 uppercase tracking-tighter">
                <span>Logicalis</span>
            </div>
            <div class="flex space-x-2 border-l pl-3">
                <button onclick="showView('tasks')" class="nav-btn text-[10px] font-bold text-blue-900 uppercase" data-view="tasks">Tareas</button>
                <button onclick="showView('agenda')" class="nav-btn text-[10px] font-bold text-gray-400 uppercase" data-view="agenda">Agenda</button>
                <button onclick="showView('dashboard')" class="nav-btn text-[10px] font-bold text-gray-400 uppercase" data-view="dashboard">Stats</button>
            </div>
        </div>
        <button onclick="openTaskModal()" class="bg-[#004a99] text-white text-[10px] font-bold px-3 py-2 rounded-lg shadow-lg active:scale-95 transition-transform">+ NUEVA</button>
    </nav>

    <main class="mt-4 container mx-auto">
        
        <!-- Selección de Área -->
        <div id="area-selection" class="hidden px-4 py-10">
            <h2 class="text-center font-black text-gray-400 uppercase tracking-widest text-xs mb-8">Selecciona Workspace</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto">
                <button onclick="selectArea('Alianzas')" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-blue-500 flex items-center space-x-4">
                    <span class="text-3xl">🤝</span>
                    <div class="text-left">
                        <h3 class="font-bold text-lg text-blue-900">Alianzas</h3>
                        <p class="text-xs text-gray-400">Gestión estratégica</p>
                    </div>
                </button>
                <button onclick="selectArea('CCTN')" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-blue-500 flex items-center space-x-4">
                    <span class="text-3xl">⚙️</span>
                    <div class="text-left">
                        <h3 class="font-bold text-lg text-blue-900">CCTN</h3>
                        <p class="text-xs text-gray-400">Centro de Competencias</p>
                    </div>
                </button>
            </div>
        </div>

        <!-- VISTA: TABLERO KANBAN -->
        <div id="tasks-view" class="hidden px-2">
            <div class="flex justify-between items-center mb-6 px-2">
                <button onclick="backToAreas()" class="text-gray-400 flex items-center text-[10px] font-bold hover:text-blue-900">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg> CAMBIAR ÁREA
                </button>
                <span id="current-area-tag" class="bg-blue-100 text-blue-800 text-[10px] font-black px-3 py-1 rounded-full uppercase">AREA</span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest px-2 flex justify-between">Pendientes <span id="count-todo">0</span></h4>
                    <div id="col-todo" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'todo')" data-status="todo" class="kanban-column bg-gray-200/40 p-3 rounded-2xl space-y-3 border-2 border-transparent"></div>
                </div>

                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-blue-400 uppercase tracking-widest px-2 flex justify-between">En Proceso <span id="count-doing">0</span></h4>
                    <div id="col-doing" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'doing')" data-status="doing" class="kanban-column bg-blue-50/50 p-3 rounded-2xl space-y-3 border-2 border-transparent"></div>
                </div>

                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-green-500 uppercase tracking-widest px-2 flex justify-between">Completado <span id="count-done">0</span></h4>
                    <div id="col-done" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'done')" data-status="done" class="kanban-column bg-green-50/50 p-3 rounded-2xl space-y-3 border-2 border-transparent"></div>
                </div>
            </div>
        </div>

        <!-- VISTA: AGENDA -->
        <div id="agenda-view" class="hidden px-4">
             <div class="mb-6">
                <h1 class="text-blue-900 font-black text-xl uppercase">Agenda de Vencimientos</h1>
            </div>
            <div id="agenda-list" class="space-y-6 ml-4 border-l-2 border-gray-100 pl-6 relative"></div>
        </div>

        <!-- VISTA: DASHBOARD -->
        <div id="dashboard-view" class="hidden px-4 pb-20">
            <h1 class="text-center text-blue-900 font-black text-xl mb-8 uppercase">Estadísticas</h1>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="stat-card border-b-blue-900">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Total</p>
                    <h3 id="kpi-total" class="text-3xl font-black text-blue-900">0</h3>
                </div>
                <div class="stat-card border-b-cyan-500">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Progreso</p>
                    <h3 id="kpi-progress" class="text-3xl font-black text-gray-700">0%</h3>
                </div>
                <div class="stat-card border-b-red-600">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Vencidas</p>
                    <h3 id="kpi-overdue" class="text-3xl font-black text-red-600">0</h3>
                </div>
                <div class="stat-card">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">CCTN/Alianzas</p>
                    <h3 id="kpi-ratio" class="text-xl font-black text-gray-700">0/0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm mb-6 h-64">
                <canvas id="lineChart"></canvas>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm h-64"><canvas id="barChart"></canvas></div>
                <div class="bg-white p-6 rounded-3xl shadow-sm h-64"><canvas id="donutChart"></canvas></div>
            </div>
        </div>
    </main>

    <!-- Modal Tarea -->
    <div id="task-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[1000] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-blue-900">Nueva Tarea</h3>
            <form id="task-form" onsubmit="saveTask(event)" class="space-y-4">
                <input type="text" id="task-title" placeholder="Título" required class="w-full bg-gray-100 p-3 rounded-xl outline-none text-sm">
                <div class="grid grid-cols-2 gap-3">
                    <select id="task-area" class="bg-gray-100 p-3 rounded-xl text-sm outline-none">
                        <option value="Alianzas">Alianzas</option>
                        <option value="CCTN">CCTN</option>
                    </select>
                    <input type="date" id="task-date" required class="bg-gray-100 p-3 rounded-xl text-sm outline-none">
                </div>
                <textarea id="task-desc" placeholder="Detalles" class="w-full bg-gray-100 p-3 rounded-xl text-sm outline-none h-20"></textarea>
                <div class="flex space-x-2">
                    <button type="button" onclick="closeTaskModal()" class="flex-1 bg-gray-200 py-3 rounded-xl font-bold text-xs">Cancelar</button>
                    <button type="submit" class="flex-1 bg-[#004a99] text-white py-3 rounded-xl font-bold text-xs">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Confirmación de Eliminación -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[2000] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-3xl p-8 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">¿Eliminar Tarea?</h3>
            <p id="confirm-task-name" class="text-sm text-gray-500 mb-6 px-2 italic">Nombre de la tarea</p>
            <div class="flex flex-col space-y-2">
                <button id="confirm-delete-btn" class="w-full bg-red-600 text-white font-bold py-3 rounded-2xl active:scale-95 transition-transform uppercase text-xs tracking-widest">Sí, Eliminar</button>
                <button onclick="closeConfirmModal()" class="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-2xl active:scale-95 transition-transform uppercase text-xs tracking-widest">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHV61Lh6QefR1AgHMwte6051Xaydij3Iw",
            authDomain: "gestor-de-tareas-249cd.firebaseapp.com",
            projectId: "gestor-de-tareas-249cd",
            storageBucket: "gestor-de-tareas-249cd.firebasestorage.app",
            messagingSenderId: "560578282378",
            appId: "1:560578282378:web:761eb05a90c4d663a9fe73"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let tasks = [];
        let currentArea = null;
        let isInitialLoad = true;
        let taskToDeleteId = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            
            onSnapshot(collection(db, 'gestor_tareas'), (snapshot) => {
                tasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('loading').classList.add('hidden');
                
                if (isInitialLoad) {
                    if (!isAnyViewVisible()) {
                        document.getElementById('area-selection').classList.remove('hidden');
                    }
                    isInitialLoad = false;
                }
                refreshUI();
            });
        });

        function isAnyViewVisible() {
            return !document.getElementById('tasks-view').classList.contains('hidden') || 
                   !document.getElementById('agenda-view').classList.contains('hidden') ||
                   !document.getElementById('dashboard-view').classList.contains('hidden');
        }

        function refreshUI() {
            renderTasks();
            renderAgenda();
            updateStats();
            if(!document.getElementById('dashboard-view').classList.contains('hidden')) initCharts();
        }

        window.showView = (v) => {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.replace('text-blue-900', 'text-gray-400');
                if(b.dataset.view === v) b.classList.replace('text-gray-400', 'text-blue-900');
            });
            
            if (v === 'tasks' && !currentArea) {
                document.getElementById('area-selection').classList.remove('hidden');
            } else {
                document.getElementById(`${v}-view`).classList.remove('hidden');
            }
            refreshUI();
        };

        window.selectArea = (a) => { 
            currentArea = a; 
            document.getElementById('current-area-tag').innerText = a; 
            showView('tasks'); 
        };

        window.backToAreas = () => { 
            currentArea = null; 
            showView('tasks'); 
        };

        window.handleDragStart = (e, id) => {
            if (taskToDeleteId) {
                e.preventDefault();
                return;
            }
            e.dataTransfer.setData("taskId", id);
            e.target.classList.add('dragging');
        };
        window.handleDragEnd = (e) => {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('column-highlight'));
        };
        window.allowDrop = (e) => { e.preventDefault(); e.currentTarget.classList.add('column-highlight'); };
        window.handleDrop = async (e, newStatus) => {
            e.preventDefault();
            const id = e.dataTransfer.getData("taskId");
            if (id) await updateDoc(doc(db, 'gestor_tareas', id), { status: newStatus, updatedAt: serverTimestamp() });
        };

        window.openConfirmDelete = (id, title) => {
            taskToDeleteId = id;
            document.getElementById('confirm-task-name').innerText = title;
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.closeConfirmModal = () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            taskToDeleteId = null;
        };

        // CORRECCIÓN: Acción de confirmar el borrado
        document.getElementById('confirm-delete-btn').onclick = async () => {
            if (taskToDeleteId) {
                const idToProcess = taskToDeleteId;
                // Cerramos el modal inmediatamente para mejorar UX
                closeConfirmModal(); 
                
                try {
                    await deleteDoc(doc(db, 'gestor_tareas', idToProcess));
                } catch (err) {
                    console.error("Error al borrar:", err);
                    alert("Error al eliminar la tarea. Inténtalo de nuevo.");
                }
            }
        };

        function renderTasks() {
            const cols = ['todo', 'doing', 'done'];
            cols.forEach(c => {
                const el = document.getElementById(`col-${c}`);
                if (el) el.innerHTML = '';
            });

            tasks.filter(t => t.area === currentArea).forEach(t => {
                const card = document.createElement('div');
                card.className = "task-card bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md mb-3";
                card.draggable = true;
                card.ondragstart = (e) => handleDragStart(e, t.id);
                card.ondragend = (e) => handleDragEnd(e);
                
                card.innerHTML = `
                    <div class="delete-hitbox text-gray-300" 
                         onmousedown="event.stopPropagation(); window.openConfirmDelete('${t.id}', '${t.title}')"
                         title="Eliminar">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </div>
                    <h5 class="font-bold text-gray-800 text-sm leading-tight pr-8 pointer-events-none">${t.title}</h5>
                    <p class="text-[10px] text-gray-400 mt-1 mb-3 line-clamp-2 pointer-events-none">${t.desc || 'Sin descripción'}</p>
                    <div class="flex items-center justify-between pointer-events-none">
                        <div class="text-[9px] font-black text-gray-400 uppercase">${t.date}</div>
                        <div class="w-2 h-2 rounded-full ${t.status === 'done' ? 'bg-green-400' : (t.status === 'doing' ? 'bg-blue-400' : 'bg-gray-300')}"></div>
                    </div>
                `;

                const col = document.getElementById(`col-${t.status}`);
                if (col) col.appendChild(card);
            });

            cols.forEach(c => {
                const count = tasks.filter(t => t.area === currentArea && t.status === c).length;
                if (document.getElementById(`count-${c}`)) document.getElementById(`count-${c}`).innerText = count;
            });
        }

        window.openTaskModal = () => document.getElementById('task-modal').classList.remove('hidden');
        window.closeTaskModal = () => document.getElementById('task-modal').classList.add('hidden');
        window.saveTask = async (e) => {
            e.preventDefault();
            const id = Date.now().toString();
            await setDoc(doc(db, 'gestor_tareas', id), {
                title: document.getElementById('task-title').value,
                area: document.getElementById('task-area').value,
                desc: document.getElementById('task-desc').value,
                date: document.getElementById('task-date').value,
                status: 'todo', 
                updatedAt: serverTimestamp()
            });
            closeTaskModal();
            document.getElementById('task-form').reset();
        };

        function updateStats() {
            const total = tasks.length || 0;
            const done = tasks.filter(t => t.status === 'done').length;
            const overdue = tasks.filter(t => t.status !== 'done' && t.date < new Date().toISOString().split('T')[0]).length;
            if(document.getElementById('kpi-total')) document.getElementById('kpi-total').innerText = total;
            if(document.getElementById('kpi-progress')) document.getElementById('kpi-progress').innerText = total ? `${Math.round((done/total)*100)}%` : '0%';
            if(document.getElementById('kpi-overdue')) document.getElementById('kpi-overdue').innerText = overdue;
            if(document.getElementById('kpi-ratio')) document.getElementById('kpi-ratio').innerText = `${tasks.filter(t => t.area === 'CCTN').length}/${tasks.filter(t => t.area === 'Alianzas').length}`;
        }

        function renderAgenda() {
            const container = document.getElementById('agenda-list');
            if(!container) return;
            container.innerHTML = '';
            const pending = tasks.filter(t => t.status !== 'done').sort((a,b) => new Date(a.date) - new Date(b.date));
            if(pending.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-400 italic">No hay pendientes.</p>';
                return;
            }
            pending.forEach(t => {
                const item = document.createElement('div');
                item.className = "relative mb-6";
                item.innerHTML = `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-900"><h4 class="font-bold text-sm">${t.title}</h4><p class="text-[10px] text-gray-400 font-bold mt-1">${t.date} - ${t.area}</p></div>`;
                container.appendChild(item);
            });
        }

        let charts = {};
        function initCharts() {
            const barCtx = document.getElementById('barChart');
            if(!barCtx) return;
            if(charts.bar) charts.bar.destroy();
            charts.bar = new Chart(barCtx, {
                type: 'bar',
                data: { labels: ['P', 'E', 'O'], datasets: [{ data: [tasks.filter(t => t.status === 'todo').length, tasks.filter(t => t.status === 'doing').length, tasks.filter(t => t.status === 'done').length], backgroundColor: ['#58595b', '#00aef0', '#10b981'] }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    </script>
</body>
</html>
